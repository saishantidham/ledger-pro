<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ledger Pro</title>
    <link rel="icon" href="data:,">
    
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/form.css">
</head>
<body>
    <main id="auth-view" class="view active-view">
        <div class="auth-container">
            <div class="glass-card login-card">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1>Ledger Pro</h1>
                <p class="subtitle">Secure Maintenance Portal</p>
                
                <form id="login-form">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Admin Email" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" id="login-btn" class="btn-primary full-width mt-compact">Sign In</button>
                    <p id="auth-error" class="error-text hidden"></p>
                </form>
            </div>
        </div>
    </main>

    <main id="hub-view" class="view hidden-view">
        <div class="hub-container">
            <header class="hub-header">
                <div>
                    <h2 id="greeting-text" class="fluent-title">Good Evening,</h2>
                    <p class="text-muted">Here is your society overview for <span id="financial-year">FY 26-27</span></p>
                </div>
                <button id="hub-settings-btn" class="btn-fluent-icon" aria-label="Settings">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </header>

            <section class="dashboard-stats mt-large">
                <div class="fluent-card stat-card">
                    <div class="stat-icon-wrapper success-bg">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <div>
                        <p class="stat-label">Today's Collection</p>
                        <h3 id="stat-today">₹0</h3>
                    </div>
                </div>
                <div class="fluent-card stat-card">
                    <div class="stat-icon-wrapper primary-bg">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    </div>
                    <div>
                        <p class="stat-label">Month Total</p>
                        <h3 id="stat-month">₹0</h3>
                    </div>
                </div>
            </section>

            <section class="session-setup fluent-card mt-large highlight-border">
                <h3>Start Logging Session</h3>
                <p class="text-muted text-sm mb-medium">Select the date context for your entries. All receipts generated in this session will default to this date.</p>
                <div class="input-group">
                    <input type="date" id="session-date-picker" required>
                </div>
                <button id="start-session-btn" class="btn-primary full-width mt-medium">Continue to Ledger</button>
            </section>
        </div>
    </main>

    <main id="workspace-view" class="view hidden-view">
        <header class="workspace-header">
            <button id="back-to-hub-btn" class="btn-fluent-icon" aria-label="Back to Hub">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="workspace-title">
                <h3>New Entry</h3>
                <p id="active-session-date" class="text-muted text-xs">Date: --</p>
            </div>
            <div style="width: 40px;"></div> </header>

        <section id="form-engine-container" class="form-engine">
             <form id="receipt-form" class="ledger-form">
                </form>
        </section>
    </main>

    </body>
</html>
