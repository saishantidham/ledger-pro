<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ledger Pro</title>
    <link rel="icon" href="data:,">
    
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>

    <main id="auth-view" class="view active-view flex-center">
        <div class="glass-card login-card">
            <h1 class="brand-title">Ledger Pro</h1>
            <p class="subtitle">Maintenance Portal</p>
            <form id="login-form" onsubmit="event.preventDefault();">
                <input type="email" id="email" class="compact-input" placeholder="Admin Email" required>
                <input type="password" id="password" class="compact-input mt-sm" placeholder="Password" required>
                <button type="submit" id="login-btn" class="btn-primary full-width mt-md">Sign In</button>
                <p id="auth-error" class="error-text hidden"></p>
            </form>
        </div>
    </main>

    <main id="hub-view" class="view hidden-view screen-lock">
        <div class="hub-wrapper">
            <header class="hub-header">
                <div>
                    <h2 id="greeting-text" class="hero-title">Good Evening,</h2>
                    <p class="text-muted text-xs">Overview for <span id="financial-year">FY 26-27</span></p>
                </div>
                <button id="hub-settings-btn" class="icon-btn">⚙️</button>
            </header>

            <section class="calendar-card mt-md">
                <div class="calendar-header">
                    <h4 id="cal-month-year">June 2026</h4>
                </div>
                <div class="calendar-grid-days">
                    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                </div>
                <div id="calendar-grid" class="calendar-grid">
                    </div>
                <p class="text-center text-xs text-muted mt-sm">Select a date to begin session</p>
            </section>

            <button id="view-reports-btn" class="btn-secondary full-width mt-md">
                <span>📊 View Master Report</span>
                <span class="text-xs">Excel Generation</span>
            </button>

            <div class="flex-spacer"></div>

            <footer class="stats-row">
                <div class="stat-box">
                    <span class="stat-val" id="stat-today">₹0</span>
                    <span class="stat-lbl">Today's Total</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-box">
                    <span class="stat-val" id="stat-month">₹0</span>
                    <span class="stat-lbl">Month Total</span>
                </div>
            </footer>
        </div>
    </main>

    <main id="workspace-view" class="view hidden-view screen-lock">
        <header class="workspace-header">
            <button id="back-to-hub-btn" class="icon-btn">←</button>
            <div class="workspace-title">
                <h3 id="serial-display">Entry #--</h3>
                <p id="active-session-date" class="text-xs text-saffron">--/--/----</p>
            </div>
            <div class="mode-toggle-mini">
                <label class="switch-mini"><input type="checkbox" id="mode-toggle"><span class="slider-mini"></span></label>
                <span class="text-xs">Edit</span>
            </div>
        </header>

        <section class="form-engine">
            <form id="receipt-form" onsubmit="event.preventDefault();" class="compact-form">
                
                <div class="grid-2">
                    <div class="input-wrap">
                        <label>Receipt No.</label>
                        <input type="text" id="receipt-no" class="compact-input" placeholder="Auto" disabled>
                    </div>
                    <div class="input-wrap relative">
                        <label>Date</label>
                        <div id="display-date" class="fake-input">DD/MM/YYYY</div>
                        <input type="date" id="receipt-date" class="hidden-native-picker" required>
                    </div>
                </div>

                <button type="button" id="open-flat-search" class="flat-search-trigger mt-sm">
                    🔍 Search Owner, Flat, or Bldg...
                </button>

                <div class="grid-2 mt-sm">
                    <div class="input-wrap">
                        <label>Owner Name</label>
                        <input type="text" id="owner-name" class="compact-input" placeholder="Name" required>
                    </div>
                    <div class="input-wrap">
                        <label>WhatsApp No.</label>
                        <input type="tel" id="owner-phone" class="compact-input" placeholder="Phone" required>
                    </div>
                </div>

                <div class="grid-2 mt-sm align-end">
                    <div class="input-wrap">
                        <label>Base Fee (₹)</label>
                        <input type="number" id="base-fee" class="compact-input" placeholder="0" required>
                    </div>
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="is-rented">
                        <span class="check-box"></span>
                        <span class="text-sm">(R) Rented</span>
                    </label>
                </div>

                <div class="grid-2 mt-sm">
                    <div class="input-wrap relative">
                        <label>From Month</label>
                        <div id="display-month-from" class="fake-input">MMM YYYY</div>
                        <input type="month" id="month-from" class="hidden-native-picker" required>
                    </div>
                    <div class="input-wrap relative">
                        <label>To Month</label>
                        <div id="display-month-to" class="fake-input">MMM YYYY</div>
                        <input type="month" id="month-to" class="hidden-native-picker" required>
                    </div>
                </div>
                <div class="calc-text mt-xs" id="months-calculated">0 Months</div>

                <div class="grid-2 mt-sm highlight-row">
                    <div class="input-wrap">
                        <label>Cash</label>
                        <input type="number" id="cash-amount" class="compact-input bold-val" placeholder="0" min="0">
                    </div>
                    <div class="input-wrap">
                        <label>Online</label>
                        <input type="number" id="online-amount" class="compact-input bold-val" placeholder="0" min="0">
                    </div>
                </div>
                <div class="total-bar">Total: <span id="total-amount-display">₹0</span></div>

                <div class="input-wrap mt-sm">
                    <div class="flex-between">
                        <label>Remarks</label>
                        <span id="char-count" class="text-xs text-muted">0/50</span>
                    </div>
                    <input type="text" id="remarks" class="compact-input" placeholder="Optional notes..." maxlength="50">
                </div>

                <button type="submit" id="submit-receipt-btn" class="btn-primary full-width mt-md">Log Entry</button>
            </form>
        </section>
    </main>

    <div id="flat-search-modal" class="bottom-sheet-overlay hidden">
        <div class="bottom-sheet glass-panel h-80">
            <div class="sheet-header">
                <h3>Select Flat</h3>
                <button id="close-flat-search" class="icon-btn">✕</button>
            </div>
            <input type="text" id="flat-search-input" class="compact-input search-box" placeholder="Search A-101, Ramesh...">
            <ul id="flat-list" class="virtual-list">
                </ul>
        </div>
    </div>

    <div id="success-modal-overlay" class="modal-overlay hidden">
        <div class="compact-modal glass-panel">
            <div class="success-icon-ring">✓</div>
            <h3>Entry Logged</h3>
            <p class="mono-text mt-sm" id="snapshot-text">...</p>
            <button id="modal-wa-btn" class="btn-success full-width mt-md">WhatsApp Receipt</button>
            <button id="modal-next-btn" class="btn-ghost full-width mt-sm">Next Entry</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
